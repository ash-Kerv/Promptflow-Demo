id: template_chat_flow
name: Template Chat Flow
inputs:
  chat_history:
    type: list
    is_chat_input: false
    is_chat_history: true
  question:
    type: string
    is_chat_input: true
outputs:
  answer:
    type: string
    reference: ${query_graph_chat.output}
    is_chat_output: true
nodes:
- name: query_graph_chat
  type: python
  source:
    type: code
    path: query_graph_chat.py
  inputs:
    chat_history: ${inputs.chat_history}
    chat_input: ${inputs.question}
    community_level: 1
    dynamic_community_selection: true
    project_dir: GraphRAGprj
    restore_account_url: https://.blob.core.windows.net
    restore_container: crhukoutput
    restore_prefix: graphrag_output_customerdata_v270/graphrag
    restore_sas_token: 
    search_mode: local
    search_timeout_seconds: 600
  use_variants: false
node_variants: {}
app_insights_enabled: true
environment:
  python_requirements_txt: requirements.txt
  image: 
